version: "3.8"

services:
  # ── Milvus 向量数据库 ──
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "0"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - milvus_etcd_data:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      # ⚠️ 生产部署请修改以下默认值！
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── Med-Rag 应用 ──
  med-rag:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      RAG_MILVUS_HOST: milvus
      RAG_MILVUS_PORT: 19530
      RAG_REDIS_HOST: redis
      RAG_REDIS_PORT: 6379
      RAG_LLM_PROVIDER: deepseek
      RAG_DEEPSEEK_API_KEY: ""  # ⚠️ 请通过 .env 文件填入，勿硬编码
      RAG_BOOTSTRAP_ADMIN_KEY: ${RAG_BOOTSTRAP_ADMIN_KEY:-}
      RAG_CORS_ORIGINS: ${RAG_CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - knowledge_data:/app/data
      - whoosh_data:/app/whoosh_index
    depends_on:
      - milvus
      - redis

volumes:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:
  redis_data:
  knowledge_data:
  whoosh_data:
