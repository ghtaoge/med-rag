# Med-Rag 企业级医疗知识助手配置

app:
  name: "Med-Rag 知识助手"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8000
  environment: "development"

milvus:
  host: localhost
  port: 19530
  collection_name: med_rag_chunks
  embedding_dim: 1024
  index_type: HNSW
  metric_type: COSINE
  M: 32
  efConstruction: 256
  ef_search: 128

redis:
  host: localhost
  port: 6379
  db: 0
  file_hash_prefix: "med_rag:file_hash:"
  session_prefix: "med_rag:session:"
  session_ttl: 86400

chunker:
  min_chunk_size: 150
  max_chunk_size: 500
  overlap: 50

retrieval:
  default_top_k: 5
  vector_top_k: 20
  keyword_top_k: 20
  rrf_k: 60
  rerank_top_k: 5
  min_relevance_score: 0.05
  llm_fallback_enabled: true

llm:
  provider: deepseek
  fallback: qwen
  temperature: 0.3
  max_tokens: 4096
  deepseek:
    api_key: ""
    base_url: "https://api.deepseek.com"
    model: "deepseek-chat"
  qwen:
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-plus"
  zhipu:
    api_key: ""
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4-plus"

security:
  max_upload_bytes: 52428800
  max_archive_ratio: 100
  max_archive_uncompressed_bytes: 524288000
  max_archive_members: 10000

cors:
  allowed_origins:
    - "http://localhost:3000"

database:
  url: "sqlite:///./data/med_rag.db"

auth:
  jwt_secret: ""
  access_ttl_seconds: 900
  refresh_ttl_seconds: 604800
  issuer: "med-rag"
  secure_cookies: true

safety:
  enabled: true
  policy_version: "2026-07-21.1"
  classifier_base_url: "http://safety-model:8000/v1"
  classifier_model: "Qwen/Qwen3Guard-Gen-0.6B"
  classifier_timeout_seconds: 3
  normal_max_chars: 4000
  degraded_max_chars: 500
  restricted_top_k: 3
  restricted_preview_chars: 300
  stream_buffer_chars: 512

storage:
  root: "data/documents"

parser:
  queue_name: "med-rag-parse"
  clamav_host: "clamav"
  clamav_port: 3310
  max_pdf_pages: 1000
  max_image_width: 10000
  max_image_height: 10000
  max_sheet_rows: 200000
  max_sheet_columns: 500
  max_nonempty_cells: 2000000
  timeout_seconds: 600
  quarantine_retention_days: 30

knowledge_dir: data
whoosh_dir: whoosh_index
log_level: INFO
