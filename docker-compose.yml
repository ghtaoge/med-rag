services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "0"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - milvus_etcd_data:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - default
      - parser-internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: med_rag
      POSTGRES_USER: med_rag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U med_rag -d med_rag"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - default
      - parser-internal

  clamav:
    image: clamav/clamav:1.4
    environment:
      CLAMD_CONF_StreamMaxLength: 50M
    volumes:
      - clamav_signatures:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks: ["parser-internal"]

  safety-model:
    image: vllm/vllm-openai:v0.9.2
    command:
      - --model
      - Qwen/Qwen3Guard-Gen-0.6B
      - --max-model-len
      - "4096"
    profiles: ["safety-gpu"]
    networks: ["safety-internal"]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

  med-rag:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      RAG_MILVUS_HOST: milvus
      RAG_MILVUS_PORT: 19530
      RAG_REDIS_HOST: redis
      RAG_REDIS_PORT: 6379
      RAG_LLM_PROVIDER: ${RAG_LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      RAG_CORS_ORIGINS: ${RAG_CORS_ORIGINS:-http://localhost:3000}
      RAG_DATABASE_URL: postgresql+psycopg://med_rag:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/med_rag
      RAG_JWT_SECRET: ${RAG_JWT_SECRET:-}
      RAG_SECURE_COOKIES: ${RAG_SECURE_COOKIES:-true}
      RAG_ENVIRONMENT: production
      RAG_SAFETY_ENABLED: ${RAG_SAFETY_ENABLED:-true}
      RAG_SAFETY_CLASSIFIER_BASE_URL: http://safety-model:8000/v1
      RAG_STORAGE_ROOT: /data
      RAG_KNOWLEDGE_DIR: /data
      RAG_CLAMAV_HOST: clamav
    volumes:
      - document_quarantine:/data/quarantine
      - document_parsed:/data/parsed:ro
      - document_original:/data/original:ro
      - whoosh_data:/app/whoosh_index
    depends_on:
      milvus:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - default
      - safety-internal

  parser-worker:
    build:
      context: .
      dockerfile: deploy/parser-worker.Dockerfile
    user: "10001:10001"
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 8g
    cpus: 4
    tmpfs:
      - /tmp:size=1g,noexec,nosuid,nodev
      - /data/temporary:size=1g,noexec,nosuid,nodev
    environment:
      RAG_DATABASE_URL: postgresql+psycopg://med_rag:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/med_rag
      RAG_REDIS_HOST: redis
      RAG_REDIS_PORT: 6379
      RAG_STORAGE_ROOT: /data
      RAG_CLAMAV_HOST: clamav
      RAG_ENVIRONMENT: production
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    networks: ["parser-internal"]
    volumes:
      - document_quarantine:/data/quarantine:ro
      - document_parsed:/data/parsed:rw
      - document_original:/data/original:rw
      - model_cache:/models:ro
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy

volumes:
  milvus_etcd_data:
  milvus_minio_data:
  milvus_data:
  redis_data:
  postgres_data:
  clamav_signatures:
  document_quarantine:
  document_parsed:
  document_original:
  model_cache:
  whoosh_data:

networks:
  safety-internal:
    internal: true
  parser-internal:
    internal: true
